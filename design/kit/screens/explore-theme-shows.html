<!-- @dsCard group="Explore" -->
<title>Explore by theme — show deck</title>
<link rel="stylesheet" href="../fonts/fonts.css">
<style>
  :root {
    --coral: #FF6A4D; --coral-deep: #CA340F; --mint: #34E0C4; --mint-deep: #046B58; --grape: #7C6BFF;
    --sp-1: 4px; --sp-2: 8px; --sp-3: 12px; --sp-4: 16px; --sp-5: 20px; --sp-6: 26px; --sp-7: 32px; --gutter: var(--sp-5);
    --r-lg: 20px; --r-md: 16px; --r-sm: 12px; --r-field: 11px; --r-art: 14px; --r-seg: 9px; --r-pill: 999px;
    --dur-fast: .2s; --dur-mid: .3s; --dur-row: .55s; --dur-rise: .6s;
    --ease-spring: cubic-bezier(.34, 1.56, .64, 1); --ease-soft: cubic-bezier(.22, .61, .36, 1);
    --elev-list: 0 1px 0 var(--hairline), 0 8px 24px -18px rgba(0,0,0,.5);
    --elev-card: 0 1px 0 var(--hairline), 0 12px 30px -20px rgba(0,0,0,.55);
    --elev-sub: 0 6px 14px -8px var(--accent);
    --elev-pop: 0 20px 50px -24px rgba(0,0,0,.6);
    --font: "Roboto", -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    --font-display: "IBM Plex Mono", ui-monospace, "SF Mono", Menlo, monospace;
  }
  :root, :root[data-theme="dark"] {
    --bg: #0E0B12; --grouped-bg: #0E0B12; --bg-glow-1: rgba(255,106,77,.10); --bg-glow-2: rgba(52,224,196,.07);
    --surface: #1C1722; --surface-2: #262030; --hairline: rgba(255,255,255,.09); --separator: rgba(255,255,255,.12);
    --text: #F8F3EF; --text-dim: #ABA1B4; --text-faint: #988DA1;
    --accent: var(--coral); --accent-2: var(--mint); --on-accent: #2A0E04;
    --chip: rgba(255,255,255,.08); --chip-text: #F8F3EF; --field: rgba(120,120,128,.24); --danger: #FF453A;
    --bar-material: rgba(20,16,26,.72);
    --tabbar-glass: rgba(14,11,18,.94); --tabbar-hairline: rgba(255,255,255,.14);
    --tabbar-shadow: 0 10px 34px -8px rgba(0,0,0,.6), 0 2px 10px -4px rgba(0,0,0,.5); --tabbar-icon: #8B8291;
  }
  :root[data-theme="light"] {
    --bg: #F2F1F6; --grouped-bg: #F2F1F6; --bg-glow-1: rgba(245,80,47,.09); --bg-glow-2: rgba(6,169,139,.08);
    --surface: #FFFFFF; --surface-2: #F6F1EC; --hairline: rgba(40,26,36,.10); --separator: rgba(60,60,67,.18);
    --text: #1A1420; --text-dim: #6B6472; --text-faint: #736A78;
    --accent: var(--coral-deep); --accent-2: var(--mint-deep); --on-accent: #FFFFFF;
    --chip: rgba(118,118,128,.12); --chip-text: #1A1420; --field: rgba(118,118,128,.10); --danger: #FF3B30;
    --bar-material: rgba(248,246,250,.78);
    --tabbar-glass: rgba(250,248,252,.96); --tabbar-hairline: rgba(60,60,67,.18);
    --tabbar-shadow: 0 10px 34px -10px rgba(20,16,26,.22), 0 2px 10px -4px rgba(20,16,26,.12); --tabbar-icon: #6C6C70;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: var(--font);
    background: radial-gradient(120% 60% at 85% -5%, #211a2b, transparent 60%), radial-gradient(90% 50% at 0% 8%, #17131e, transparent 55%), #0a070e;
    color: var(--text); min-height: 100vh; display: grid; place-items: center; padding: 28px 12px;
    transition: background .5s var(--ease-soft);
  }
  :root[data-theme="light"] body {
    background: radial-gradient(120% 60% at 85% -5%, #f0e6f4, transparent 60%), radial-gradient(90% 50% at 0% 8%, #eef0f6, transparent 55%), #e6e4ee;
  }
  .theme-toggle {
    position: fixed; top: 16px; right: 16px; z-index: 100; height: 44px; padding: 0 16px 0 14px;
    display: inline-flex; align-items: center; gap: 8px; border: 1px solid rgba(255,255,255,.16);
    border-radius: var(--r-pill); background: rgba(30,24,38,.7); backdrop-filter: blur(14px);
    color: #F8F3EF; font-family: var(--font); font-size: .82rem; font-weight: 700; cursor: pointer;
    transition: transform .3s var(--ease-spring), background .3s;
  }
  :root[data-theme="light"] .theme-toggle { background: rgba(255,255,255,.82); border-color: rgba(40,26,36,.12); color: #1A1420; }
  .theme-toggle:active { transform: scale(.92); }
  .theme-toggle .tg-emoji { font-size: 1rem; transition: transform .5s var(--ease-spring); }

  .phone {
    position: relative; width: 390px; height: 844px; border-radius: 54px; background: var(--grouped-bg);
    box-shadow: 0 0 0 12px #050308, 0 0 0 14px #322838, 0 50px 90px -30px rgba(0,0,0,.85);
    overflow: hidden; transition: background .5s var(--ease-soft);
  }
  .phone::before {
    content: ""; position: absolute; inset: 0; z-index: 0; pointer-events: none;
    background: radial-gradient(58% 20% at 92% 0%, var(--bg-glow-1), transparent 70%), radial-gradient(46% 16% at 2% 6%, var(--bg-glow-2), transparent 72%);
  }
  .screen { position: absolute; inset: 0; z-index: 1; display: flex; flex-direction: column; overflow: hidden; background: transparent; }
  .statusbar {
    height: 54px; flex: none; display: flex; align-items: flex-end; justify-content: space-between;
    padding: 0 28px 8px; font-size: .82rem; font-weight: 700; position: relative; z-index: 30;
  }
  .statusbar .sb-right { display: flex; align-items: center; gap: 6px; }
  .sb-right svg { display: block; }
  .notch { position: absolute; top: 11px; left: 50%; transform: translateX(-50%); width: 118px; height: 30px; border-radius: 18px; background: #050308; z-index: 40; }

  /* ---------- top bar ---------- */
  .topbar {
    flex: none; display: flex; align-items: center; gap: var(--sp-3);
    padding: var(--sp-1) var(--gutter) var(--sp-2); position: relative; z-index: 20;
  }
  .iconbtn {
    flex: none; width: 40px; height: 40px; border-radius: 50%; display: grid; place-items: center;
    border: none; cursor: pointer; background: var(--chip); color: var(--text);
    box-shadow: inset 0 0 0 .5px var(--hairline); transition: transform .3s var(--ease-spring), background .3s;
  }
  .iconbtn:active { transform: scale(.9); }
  .topbar .tb-title { flex: 1; min-width: 0; text-align: center; }
  .topbar .tb-eyebrow { font-size: .64rem; font-weight: 800; letter-spacing: .14em; text-transform: uppercase; color: var(--accent);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .topbar .tb-name { font-family: var(--font-display); font-weight: 700; font-size: 1.02rem; letter-spacing: -.01em; color: var(--text); margin-top: 1px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .progresspill {
    flex: none; min-width: 52px; height: 40px; padding: 0 14px; border-radius: var(--r-pill);
    display: inline-flex; align-items: center; justify-content: center; gap: 3px;
    background: var(--chip); color: var(--text-dim); font-size: .82rem; font-weight: 800; font-variant-numeric: tabular-nums;
  }
  .progresspill b { color: var(--text); }
  .track { flex: none; height: 3px; margin: 2px var(--gutter) 0; border-radius: 3px; background: var(--chip); overflow: hidden; }
  .track > i { display: block; height: 100%; border-radius: 3px; width: 0; background: linear-gradient(90deg, var(--accent), var(--accent-2)); transition: width .4s var(--ease-soft); }

  /* ---------- deck stage ---------- */
  .stage { flex: 1; position: relative; display: grid; place-items: center; padding: var(--sp-4) var(--gutter) 0; z-index: 2; overflow: hidden; }
  .deck { position: relative; width: 310px; height: 452px; }

  .card {
    position: absolute; inset: 0; border-radius: 28px; overflow: hidden; cursor: grab;
    box-shadow: var(--elev-card), 0 30px 60px -30px rgba(0,0,0,.7);
    transform-origin: center bottom; will-change: transform;
    user-select: none; -webkit-user-select: none; touch-action: none;
    display: flex; flex-direction: column; color: #fff; background: #241d2c;
  }
  .card.dragging { cursor: grabbing; transition: none; }
  .card.settling { transition: transform .4s var(--ease-spring); }
  .card.flyout { transition: transform .45s var(--ease-soft), opacity .45s var(--ease-soft); }

  /* artwork fills the card */
  .card .art {
    position: absolute; inset: 0; background-size: cover; background-position: center; z-index: 0;
  }
  /* gradient fallbacks (mirror RemoteArtwork's .a1–.a6) for shows without a local jpg */
  .a1 { background: linear-gradient(140deg, #FF7A4D, #FF4D8D); }
  .a2 { background: linear-gradient(140deg, #34E0C4, #2E8BFF); }
  .a3 { background: linear-gradient(140deg, #FFC24D, #FF6A4D); }
  .a4 { background: linear-gradient(140deg, #7C6BFF, #34E0C4); }
  .a5 { background: linear-gradient(140deg, #FF5E9A, #7C6BFF); }
  .a6 { background: linear-gradient(140deg, #22C1A6, #7ED957); }
  .card .scrim {
    position: absolute; inset: 0; z-index: 1; pointer-events: none;
    background: linear-gradient(180deg, rgba(0,0,0,.05) 0%, rgba(0,0,0,.0) 34%, rgba(8,5,12,.62) 66%, rgba(8,5,12,.92) 100%);
  }
  /* initial glyph shown on gradient fallbacks */
  .card .glyph {
    position: absolute; inset: 0; z-index: 0; display: grid; place-items: center;
    font-family: var(--font-display); font-weight: 700; font-size: 4.6rem; color: rgba(255,255,255,.9);
    text-shadow: 0 3px 18px rgba(0,0,0,.35);
  }
  .card.hasart .glyph { display: none; }

  .card .badge {
    position: absolute; top: 16px; left: 16px; z-index: 3;
    display: inline-flex; align-items: center; gap: 6px; font-size: .66rem; font-weight: 800;
    letter-spacing: .1em; text-transform: uppercase; color: #fff;
    background: rgba(0,0,0,.42); border: 1px solid rgba(255,255,255,.26);
    padding: 6px 11px; border-radius: var(--r-pill); backdrop-filter: blur(8px);
  }
  .card .badge .em { font-size: .82rem; }

  .card .body { position: relative; z-index: 2; margin-top: auto; padding: var(--sp-6) 22px 24px; }
  .card .title {
    font-family: var(--font-display); font-weight: 700; font-size: 1.62rem; line-height: 1.08;
    letter-spacing: -.02em; text-shadow: 0 2px 16px rgba(0,0,0,.5);
  }
  .card .author { margin-top: 7px; font-size: .84rem; font-weight: 700; color: rgba(255,255,255,.82); }
  .card .why {
    margin-top: 12px; font-size: .9rem; font-weight: 500; line-height: 1.4; color: rgba(255,255,255,.92);
    display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden;
    padding-left: 11px; border-left: 2px solid rgba(255,255,255,.35);
  }

  /* swipe verdict stamps */
  .stamp {
    position: absolute; top: 26px; z-index: 4; padding: 8px 16px; border-radius: 12px;
    font-family: var(--font-display); font-weight: 700; font-size: 1.05rem; letter-spacing: .04em;
    text-transform: uppercase; opacity: 0; border: 3px solid currentColor; background: rgba(0,0,0,.18); backdrop-filter: blur(2px);
  }
  .stamp.in  { right: 18px; color: #EBFFF9; border-color: #7BFFE6; transform: rotate(14deg) scale(.8); text-shadow: 0 0 14px rgba(52,224,196,.6); }
  .stamp.skip{ left: 18px;  color: #FFE7E4; border-color: #FF9C93; transform: rotate(-14deg) scale(.8); text-shadow: 0 0 14px rgba(255,69,58,.5); }

  .hint { flex: none; text-align: center; font-size: .8rem; font-weight: 600; color: var(--text-faint); padding: var(--sp-4) var(--gutter) 4px; z-index: 2; }

  /* ---------- action dock ---------- */
  .actions { flex: none; display: flex; align-items: center; justify-content: center; gap: 26px; padding: var(--sp-2) var(--gutter) 26px; z-index: 20; }
  .act { border: none; cursor: pointer; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center;
    transition: transform .3s var(--ease-spring), box-shadow .3s, background .3s; }
  .act:active { transform: scale(.88); }
  .act.skip { width: 62px; height: 62px; background: var(--surface); color: var(--danger);
    box-shadow: inset 0 0 0 1.5px color-mix(in srgb, var(--danger) 55%, transparent), 0 10px 24px -14px rgba(0,0,0,.6); }
  .act.sub { width: 74px; height: 74px; color: var(--on-accent);
    background: linear-gradient(135deg, var(--accent), color-mix(in srgb, var(--accent) 55%, var(--accent-2)));
    box-shadow: 0 12px 26px -8px var(--accent); }
  .act svg { display: block; }

  /* ---------- end-of-deck state ---------- */
  .endcard { position: absolute; inset: 0; display: none; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 0 40px; gap: 14px; }
  .endcard.show { display: flex; animation: rise .5s var(--ease-soft) both; }
  .endcard .glyph2 { width: 82px; height: 82px; border-radius: 26px; display: grid; place-items: center; font-size: 2.4rem;
    background: linear-gradient(140deg, var(--accent), var(--accent-2)); box-shadow: 0 18px 40px -18px var(--accent); }
  .endcard h3 { font-family: var(--font-display); font-weight: 700; font-size: 1.4rem; letter-spacing: -.01em; }
  .endcard p { font-size: .92rem; color: var(--text-dim); font-weight: 500; max-width: 26ch; }
  .endcard .saved { font-size: .82rem; font-weight: 800; color: var(--accent-2); }
  .btn-primary { min-height: 48px; padding: 0 24px; border: none; cursor: pointer; border-radius: var(--r-pill);
    font-family: var(--font); font-size: .96rem; font-weight: 800; color: var(--on-accent);
    background: linear-gradient(135deg, var(--accent), color-mix(in srgb, var(--accent) 55%, var(--accent-2)));
    box-shadow: var(--elev-sub); display: inline-flex; align-items: center; gap: 8px; transition: transform .3s var(--ease-spring); margin-top: 6px; }
  .btn-primary:active { transform: scale(.95); }

  @keyframes rise { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: none; } }
  .home-ind { position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%); width: 134px; height: 5px; border-radius: 3px; background: var(--text); opacity: .3; z-index: 25; }

  /* ---------- detail "toast" sheet (tap a card to peek) ---------- */
  .backdrop {
    position: absolute; inset: 0; z-index: 40; background: rgba(6,4,10,.55);
    backdrop-filter: blur(2px); opacity: 0; pointer-events: none; transition: opacity .3s var(--ease-soft);
  }
  .backdrop.show { opacity: 1; pointer-events: auto; }
  .sheet {
    position: absolute; left: 0; right: 0; bottom: 0; z-index: 41; height: 86%;
    background: var(--surface); border-radius: 26px 26px 0 0; overflow: hidden;
    display: flex; flex-direction: column;
    box-shadow: 0 -18px 50px -24px rgba(0,0,0,.7), inset 0 0 0 .5px var(--hairline);
    transform: translateY(102%); transition: transform .38s var(--ease-spring);
  }
  .sheet.show { transform: translateY(0); }
  .sheet.dragging { transition: none; }
  .sheet-grab { flex: none; padding: 10px 0 4px; display: grid; place-items: center; cursor: grab; }
  .sheet-grab i { width: 40px; height: 5px; border-radius: 3px; background: var(--separator); }
  .sheet-scroll { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 6px var(--gutter) 0; scrollbar-width: none; }
  .sheet-scroll::-webkit-scrollbar { width: 0; }

  .sheet-hero { display: flex; gap: var(--sp-4); align-items: flex-start; }
  .sheet-art {
    flex: none; width: 96px; height: 96px; border-radius: var(--r-md); position: relative; overflow: hidden;
    background-size: cover; background-position: center; display: grid; place-items: center;
    box-shadow: inset 0 0 0 .5px rgba(255,255,255,.16), 0 8px 20px -12px rgba(0,0,0,.55);
    font-family: var(--font-display); font-weight: 700; font-size: 2rem; color: rgba(255,255,255,.94);
  }
  .sheet-hmeta { flex: 1; min-width: 0; padding-top: 2px; }
  .sheet-title { font-family: var(--font-display); font-weight: 700; font-size: 1.28rem; letter-spacing: -.02em; line-height: 1.1; color: var(--text); }
  .sheet-author { margin-top: 5px; font-size: .86rem; font-weight: 700; color: var(--text-dim); }
  .sheet-chips { margin-top: 9px; display: flex; gap: 6px; flex-wrap: wrap; }
  .sheet-chip { font-size: .64rem; font-weight: 800; letter-spacing: .04em; text-transform: uppercase; color: var(--text-dim);
    background: var(--chip); padding: 4px 9px; border-radius: var(--r-pill); }

  .sheet-sub {
    margin-top: var(--sp-4); width: 100%; min-height: 48px; border: none; cursor: pointer; border-radius: var(--r-pill);
    font-family: var(--font); font-size: .96rem; font-weight: 800; color: var(--on-accent);
    background: linear-gradient(135deg, var(--accent), color-mix(in srgb, var(--accent) 55%, var(--accent-2)));
    box-shadow: var(--elev-sub); display: inline-flex; align-items: center; justify-content: center; gap: 8px;
    transition: transform .25s var(--ease-spring), background .3s, color .3s;
  }
  .sheet-sub:active { transform: scale(.97); }
  .sheet-sub.done { background: var(--chip); color: var(--text); box-shadow: none; }
  .sheet-sub svg { display: block; }
  .sheet-next {
    margin-top: var(--sp-2); width: 100%; min-height: 44px; border: none; cursor: pointer; border-radius: var(--r-pill);
    font-family: var(--font); font-size: .9rem; font-weight: 800; color: var(--accent); background: transparent;
    display: none; align-items: center; justify-content: center; gap: 7px;
  }
  .sheet-next.show { display: inline-flex; }

  .sheet-quote {
    margin-top: var(--sp-5); padding-left: 13px; border-left: 3px solid var(--accent);
    font-size: .96rem; font-weight: 600; line-height: 1.42; color: var(--text);
  }
  .sheet-h { margin-top: var(--sp-5); font-size: .7rem; font-weight: 800; letter-spacing: .1em; text-transform: uppercase; color: var(--text-faint); }
  .sheet-about { margin-top: 8px; font-size: .95rem; font-weight: 500; line-height: 1.5; color: var(--text-dim); }
  .sheet-foot {
    margin: var(--sp-5) 0 var(--sp-6); display: inline-flex; align-items: center; gap: 7px;
    font-size: .88rem; font-weight: 800; color: var(--accent); cursor: pointer;
  }
  .sheet-foot svg { display: block; }

  /* story arcs rail (mirrors podcast-detail's .arc-card) */
  .sh-arc-rail { display: flex; gap: var(--sp-3); overflow-x: auto; scrollbar-width: none; padding: 4px 0 2px; margin-top: 10px; }
  .sh-arc-rail::-webkit-scrollbar { height: 0; }
  .sh-arc {
    flex: none; width: 172px; border-radius: var(--r-md); padding: 12px 13px; position: relative;
    background: color-mix(in srgb, var(--accent) 12%, var(--surface-2));
    box-shadow: inset 0 0 0 .5px var(--hairline); display: flex; flex-direction: column; gap: 6px;
  }
  .sh-arc-season {
    align-self: flex-start; font-size: .6rem; font-weight: 800; letter-spacing: .06em; text-transform: uppercase;
    color: var(--accent); background: color-mix(in srgb, var(--accent) 16%, transparent); padding: 3px 8px; border-radius: var(--r-pill);
  }
  .sh-arc-name { font-size: .96rem; font-weight: 800; letter-spacing: -.01em; color: var(--text); line-height: 1.2;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; min-height: 2.3em; }
  .sh-arc-foot { display: flex; align-items: center; justify-content: space-between; margin-top: 2px; }
  .sh-arc-parts { font-size: .76rem; font-weight: 600; color: var(--text-dim); }
  .sh-arc-add {
    display: inline-flex; align-items: center; gap: 4px; border: none; cursor: pointer; border-radius: var(--r-pill);
    font-family: var(--font); font-size: .7rem; font-weight: 800; color: var(--accent);
    background: color-mix(in srgb, var(--accent) 14%, transparent); padding: 5px 9px;
  }
  .sh-arc-add svg { display: block; }

  /* recent episodes (mirrors podcast-detail's .ep row, condensed) */
  .sh-eps { margin-top: 10px; }
  .sh-ep { display: flex; align-items: center; gap: var(--sp-3); padding: 9px 0; position: relative; }
  .sh-ep:not(:last-child)::after { content: ""; position: absolute; left: 52px; right: 0; bottom: 0; height: .5px; background: var(--separator); }
  .sh-ep-art { flex: none; width: 40px; height: 40px; border-radius: 10px; background-size: cover; background-position: center;
    display: grid; place-items: center; font-family: var(--font-display); font-weight: 700; font-size: .95rem; color: rgba(255,255,255,.92);
    box-shadow: inset 0 0 0 .5px rgba(255,255,255,.16); }
  .sh-ep-body { flex: 1; min-width: 0; }
  .sh-ep-title { font-size: .92rem; font-weight: 700; letter-spacing: -.01em; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .sh-ep-meta { margin-top: 2px; font-size: .74rem; font-weight: 600; color: var(--text-faint); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .sh-ep-ctls { flex: none; display: flex; align-items: center; gap: 7px; }
  .sh-ep-ic {
    width: 32px; height: 32px; border-radius: 50%; border: none; cursor: pointer; display: grid; place-items: center;
    background: var(--chip); color: var(--text-dim); box-shadow: inset 0 0 0 .5px var(--hairline);
  }
  .sh-ep-ic.play {
    color: var(--on-accent); background: linear-gradient(135deg, var(--accent), color-mix(in srgb, var(--accent) 55%, var(--accent-2)));
    box-shadow: 0 4px 10px -5px var(--accent);
  }
  .sh-ep-ic svg { display: block; }

  /* arc filter chips (mirrors podcast-detail's .ep-filter) */
  .sh-filter { display: flex; gap: 7px; overflow-x: auto; scrollbar-width: none; padding: 2px 0 4px; margin-top: 8px; }
  .sh-filter::-webkit-scrollbar { height: 0; }
  .sh-chip {
    flex: none; border: none; cursor: pointer; border-radius: var(--r-pill); padding: 7px 13px;

      filter.innerHTML = ['All'].concat(arcNames).map((c, i) =>
        `<button class="sh-chip${i === 0 ? ' on' : ''}">${c.length > 22 ? c.slice(0, 21) + '…' : c}</button>`).join('');
      const dl = `<svg width="15" height="15" viewBox="0 0 24 24" fill="none"><path d="M12 4v10m0 0 4-4m-4 4-4-4M5 19h14" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
      const play = `<svg width="14" height="14" viewBox="0 0 14 14" fill="currentColor"><path d="M4 2.2v9.6l8.2-4.8L4 2.2z"/></svg>`;
      const add = `<svg width="15" height="15" viewBox="0 0 24 24" fill="none"><path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/></svg>`;
      eps.innerHTML = s.eps.map(ep => `
        <div class="sh-ep">
          <div class="sh-ep-art" style="${artBg}">${s.art ? '' : initial}</div>
          <div class="sh-ep-body">
            <div class="sh-ep-title">${ep.t}</div>
            <div class="sh-ep-meta">${ep.se} · ${ep.d} · ${ep.dur}</div>
          </div>
          <div class="sh-ep-ctls">
            <button class="sh-ep-ic" aria-label="Download">${dl}</button>
            <button class="sh-ep-ic" aria-label="Add to Up Next">${add}</button>
            <button class="sh-ep-ic play" aria-label="Play">${play}</button>
          </div>
        </div>`).join('');
    } else { epsH.style.display = 'none'; filter.style.display = 'none'; eps.style.display = 'none'; }

    const sub = document.getElementById('shSub');
    sub.classList.remove('done'); document.getElementById('shSubLbl').textContent = 'Subscribe';
    document.getElementById('shNext').classList.remove('show');
    document.getElementById('sheetScroll').scrollTop = 0;
    backdrop.classList.add('show'); sheet.classList.add('show');
  }
  function closeSheet() { backdrop.classList.remove('show'); sheet.classList.remove('show'); }
  function subscribeFromSheet() {
    if (sheetSubscribed) return;
    sheetSubscribed = true; subs++;
    const sub = document.getElementById('shSub');
    sub.classList.add('done'); document.getElementById('shSubLbl').textContent = 'Subscribed ✓';
    document.getElementById('shNext').classList.add('show');
    // dismiss the card behind the sheet so the NEXT card is waiting when the sheet closes
    if (topCard) { topCard.classList.add('flyout'); topCard.style.transform = 'translate(520px, 60px) rotate(22deg)'; topCard.style.opacity = '0'; }
    setTimeout(() => { idx++; render(); }, 220);
  }

  // drag the sheet down to dismiss
  (function () {
    const grab = document.getElementById('grab'); let sy = 0, dy = 0, on = false;
    grab.addEventListener('pointerdown', e => { on = true; sy = e.clientY; dy = 0; sheet.classList.add('dragging'); grab.setPointerCapture(e.pointerId); });
    grab.addEventListener('pointermove', e => { if (!on) return; dy = Math.max(0, e.clientY - sy); sheet.style.transform = `translateY(${dy}px)`; });
    const end = () => { if (!on) return; on = false; sheet.classList.remove('dragging'); sheet.style.transform = ''; if (dy > 90) closeSheet(); };
    grab.addEventListener('pointerup', end); grab.addEventListener('pointercancel', end);
  })();

  function showEnd() {
    end.classList.add('show'); hint.style.visibility='hidden'; actions.style.visibility='hidden';
    document.getElementById('endTitle').textContent = `You've seen our ${list.length} picks`;
    document.getElementById('endSub').textContent = `${meta.name} has ${meta.total} shows in the catalog — come back for more.`;
    document.getElementById('endSaved').textContent = subs ? `＋ ${subs} added to your Shows` : '';
    bar.style.width = '100%';
  }

  const root = document.documentElement, tt = document.getElementById('tt'),
        tgEmoji = document.getElementById('tgEmoji'), tgLabel = document.getElementById('tgLabel');
  root.setAttribute('data-theme', 'dark');
  tt.addEventListener('click', () => {
    const dark = root.getAttribute('data-theme') === 'dark';
    root.setAttribute('data-theme', dark ? 'light' : 'dark');
    tgEmoji.textContent = dark ? '☀️' : '🌙'; tgLabel.textContent = dark ? 'Light' : 'Dark';
  });

  render();
</script>
