<!-- @dsCard group="Explore" -->
<title>Explore by theme — theme feed</title>
<link rel="stylesheet" href="../fonts/fonts.css">
<style>
  :root {
    --coral: #FF6A4D; --coral-deep: #CA340F; --mint: #34E0C4; --mint-deep: #046B58; --grape: #7C6BFF;
    --sp-1: 4px; --sp-2: 8px; --sp-3: 12px; --sp-4: 16px; --sp-5: 20px; --sp-6: 26px; --sp-7: 32px; --gutter: var(--sp-5);
    --r-lg: 20px; --r-md: 16px; --r-sm: 12px; --r-field: 11px; --r-art: 14px; --r-seg: 9px; --r-pill: 999px;
    --dur-fast: .2s; --dur-mid: .3s; --dur-row: .55s; --dur-rise: .6s;
    --ease-spring: cubic-bezier(.34, 1.56, .64, 1); --ease-soft: cubic-bezier(.22, .61, .36, 1);
    --elev-list: 0 1px 0 var(--hairline), 0 8px 24px -18px rgba(0,0,0,.5);
    --elev-card: 0 1px 0 var(--hairline), 0 12px 30px -20px rgba(0,0,0,.55);
    --elev-sub: 0 6px 14px -8px var(--accent);
    --elev-pop: 0 20px 50px -24px rgba(0,0,0,.6);
    --font: "Roboto", -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    --font-display: "IBM Plex Mono", ui-monospace, "SF Mono", Menlo, monospace;
  }
  :root, :root[data-theme="dark"] {
    --bg: #0E0B12; --grouped-bg: #0E0B12; --bg-glow-1: rgba(255,106,77,.10); --bg-glow-2: rgba(52,224,196,.07);
    --surface: #1C1722; --surface-2: #262030; --hairline: rgba(255,255,255,.09); --separator: rgba(255,255,255,.12);
    --text: #F8F3EF; --text-dim: #ABA1B4; --text-faint: #988DA1;
    --accent: var(--coral); --accent-2: var(--mint); --on-accent: #2A0E04;
    --chip: rgba(255,255,255,.08); --chip-text: #F8F3EF; --field: rgba(120,120,128,.24); --danger: #FF453A;
    --bar-material: rgba(20,16,26,.72);
    --tabbar-glass: rgba(14,11,18,.94); --tabbar-hairline: rgba(255,255,255,.14);
    --tabbar-shadow: 0 10px 34px -8px rgba(0,0,0,.6), 0 2px 10px -4px rgba(0,0,0,.5); --tabbar-icon: #8B8291;
  }
  :root[data-theme="light"] {
    --bg: #F2F1F6; --grouped-bg: #F2F1F6; --bg-glow-1: rgba(245,80,47,.09); --bg-glow-2: rgba(6,169,139,.08);
    --surface: #FFFFFF; --surface-2: #F6F1EC; --hairline: rgba(40,26,36,.10); --separator: rgba(60,60,67,.18);
    --text: #1A1420; --text-dim: #6B6472; --text-faint: #736A78;
    --accent: var(--coral-deep); --accent-2: var(--mint-deep); --on-accent: #FFFFFF;
    --chip: rgba(118,118,128,.12); --chip-text: #1A1420; --field: rgba(118,118,128,.10); --danger: #FF3B30;
    --bar-material: rgba(248,246,250,.78);
    --tabbar-glass: rgba(250,248,252,.96); --tabbar-hairline: rgba(60,60,67,.18);
    --tabbar-shadow: 0 10px 34px -10px rgba(20,16,26,.22), 0 2px 10px -4px rgba(20,16,26,.12); --tabbar-icon: #6C6C70;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: var(--font);
    background: radial-gradient(120% 60% at 85% -5%, #211a2b, transparent 60%), radial-gradient(90% 50% at 0% 8%, #17131e, transparent 55%), #0a070e;
    color: var(--text); min-height: 100vh; display: grid; place-items: center; padding: 28px 12px;
    transition: background .5s var(--ease-soft);
  }
  :root[data-theme="light"] body {
    background: radial-gradient(120% 60% at 85% -5%, #f0e6f4, transparent 60%), radial-gradient(90% 50% at 0% 8%, #eef0f6, transparent 55%), #e6e4ee;
  }
  .theme-toggle {
    position: fixed; top: 16px; right: 16px; z-index: 100; height: 44px; padding: 0 16px 0 14px;
    display: inline-flex; align-items: center; gap: 8px; border: 1px solid rgba(255,255,255,.16);
    border-radius: var(--r-pill); background: rgba(30,24,38,.7); backdrop-filter: blur(14px);
    color: #F8F3EF; font-family: var(--font); font-size: .82rem; font-weight: 700; cursor: pointer;
    transition: transform .3s var(--ease-spring), background .3s;
  }
  :root[data-theme="light"] .theme-toggle { background: rgba(255,255,255,.82); border-color: rgba(40,26,36,.12); color: #1A1420; }
  .theme-toggle:active { transform: scale(.92); }
  .theme-toggle .tg-emoji { font-size: 1rem; transition: transform .5s var(--ease-spring); }

  .phone {
    position: relative; width: 390px; height: 844px; border-radius: 54px; background: var(--grouped-bg);
    box-shadow: 0 0 0 12px #050308, 0 0 0 14px #322838, 0 50px 90px -30px rgba(0,0,0,.85);
    overflow: hidden; transition: background .5s var(--ease-soft);
  }
  .screen { position: absolute; inset: 0; z-index: 1; display: flex; flex-direction: column; overflow: hidden; background: transparent; }

  /* ---------- overlay chrome (floats above the feed) ---------- */
  .statusbar {
    height: 54px; flex: none; display: flex; align-items: flex-end; justify-content: space-between;
    padding: 0 28px 8px; font-size: .82rem; font-weight: 700; position: absolute; top: 0; left: 0; right: 0; z-index: 30; color: #fff;
    text-shadow: 0 1px 6px rgba(0,0,0,.4);
  }
  .statusbar .sb-right { display: flex; align-items: center; gap: 6px; }
  .sb-right svg { display: block; }
  .notch { position: absolute; top: 11px; left: 50%; transform: translateX(-50%); width: 118px; height: 30px; border-radius: 18px; background: #050308; z-index: 40; }

  .topbar {
    position: absolute; top: 46px; left: 0; right: 0; z-index: 30;
    display: flex; align-items: center; gap: var(--sp-3); padding: var(--sp-1) var(--gutter);
  }
  .iconbtn {
    flex: none; width: 40px; height: 40px; border-radius: 50%; display: grid; place-items: center;
    border: none; cursor: pointer; background: rgba(0,0,0,.32); color: #fff; backdrop-filter: blur(8px);
    box-shadow: inset 0 0 0 .5px rgba(255,255,255,.22); transition: transform .3s var(--ease-spring);
  }
  .iconbtn:active { transform: scale(.9); }
  .topbar .tb-title { flex: 1; min-width: 0; text-align: center; }
  .topbar .tb-eyebrow { font-size: .64rem; font-weight: 800; letter-spacing: .14em; text-transform: uppercase; color: #fff; opacity: .92; text-shadow: 0 1px 6px rgba(0,0,0,.5); }
  .progresspill {
    flex: none; min-width: 52px; height: 40px; padding: 0 14px; border-radius: var(--r-pill);
    display: inline-flex; align-items: center; justify-content: center; gap: 3px;
    background: rgba(0,0,0,.32); color: rgba(255,255,255,.8); backdrop-filter: blur(8px);
    font-size: .82rem; font-weight: 800; font-variant-numeric: tabular-nums; box-shadow: inset 0 0 0 .5px rgba(255,255,255,.18);
  }
  .progresspill b { color: #fff; }

  /* ---------- vertical theme feed (up/down = browse) ---------- */
  .feed {
    position: absolute; inset: 0; z-index: 2; overflow-y: auto; overflow-x: hidden;
    scroll-snap-type: y mandatory; -webkit-overflow-scrolling: touch; scrollbar-width: none;
  }
  .feed::-webkit-scrollbar { width: 0; }

  .slide {
    position: relative; height: 100%; width: 100%; scroll-snap-align: start; scroll-snap-stop: always;
    display: flex; flex-direction: column; justify-content: flex-end; overflow: hidden; color: #fff;
  }
  /* per-theme gradient washes (theme cards have no artwork — the palette IS the art) */
  .g0 { background: linear-gradient(155deg, #FF6A4D, #CA340F 78%); }
  .g1 { background: linear-gradient(155deg, #7C6BFF, #3B2C8F 80%); }
  .g2 { background: linear-gradient(155deg, #2E8BFF, #12324F 82%); }
  .g3 { background: linear-gradient(155deg, #FF5E9A, #7C1D4B 80%); }
  .g4 { background: linear-gradient(155deg, #22C1A6, #046B58 82%); }
  .g5 { background: linear-gradient(155deg, #FFB03A, #B23A0F 82%); }
  .g6 { background: linear-gradient(155deg, #34E0C4, #1E5F8F 82%); }
  .g7 { background: linear-gradient(155deg, #A97BFF, #6A2C8F 82%); }

  .slide .wm {
    position: absolute; right: -22px; top: 60px; font-size: 15rem; line-height: 1;
    opacity: .15; transform: rotate(-8deg); pointer-events: none;
  }
  .slide::after {
    content: ""; position: absolute; inset: 0; pointer-events: none; z-index: 1;
    background: radial-gradient(90% 50% at 16% 4%, rgba(255,255,255,.22), transparent 52%),
                linear-gradient(180deg, rgba(0,0,0,.18) 0%, transparent 22%, transparent 52%, rgba(6,4,10,.55) 100%);
  }
  .slide .inner { position: relative; z-index: 2; padding: 0 22px 30px; }

  .kicker {
    display: inline-flex; align-items: center; gap: 7px; font-size: .66rem; font-weight: 800;
    letter-spacing: .12em; text-transform: uppercase; color: rgba(255,255,255,.9);
  }
  .kicker .em { font-size: 1rem; }
  .name {
    font-family: var(--font-display); font-weight: 700; font-size: 2.5rem; line-height: 1.0;
    letter-spacing: -.025em; margin-top: 12px; text-shadow: 0 2px 22px rgba(0,0,0,.3); max-width: 12ch;
  }
  .desc { margin-top: 14px; font-size: 1rem; font-weight: 500; line-height: 1.44; color: rgba(255,255,255,.94); max-width: 30ch; }

  /* peek of the shows inside the theme */
  .inside { margin-top: 22px; }
  .inside-label { font-size: .68rem; font-weight: 800; letter-spacing: .1em; text-transform: uppercase; color: rgba(255,255,255,.72); }
  .thumbs { display: flex; align-items: center; gap: 9px; margin-top: 10px; }
  .thumb {
    flex: none; width: 46px; height: 46px; border-radius: 12px; position: relative; overflow: hidden;
    background-size: cover; background-position: center;
    box-shadow: inset 0 0 0 1px rgba(255,255,255,.28), 0 6px 14px -8px rgba(0,0,0,.6);
    display: grid; place-items: center;
    font-family: var(--font-display); font-weight: 700; font-size: 1.1rem; color: rgba(255,255,255,.94);
  }
  .thumb.t1 { background-image: linear-gradient(140deg,#FF7A4D,#FF4D8D); }
  .thumb.t2 { background-image: linear-gradient(140deg,#34E0C4,#2E8BFF); }
  .thumb.t3 { background-image: linear-gradient(140deg,#FFC24D,#FF6A4D); }
  .thumb.t4 { background-image: linear-gradient(140deg,#7C6BFF,#34E0C4); }
  .thumb.t5 { background-image: linear-gradient(140deg,#FF5E9A,#7C6BFF); }
  .thumb.more {
    background: rgba(0,0,0,.34); box-shadow: inset 0 0 0 1px rgba(255,255,255,.24);
    font-size: .78rem; font-weight: 800; letter-spacing: -.01em; color: #fff;
  }

  /* dive-in CTA */
  .dive {
    margin-top: 24px; width: 100%; min-height: 54px; border: none; cursor: pointer; border-radius: var(--r-pill);
    font-family: var(--font); font-size: 1.02rem; font-weight: 800; letter-spacing: .01em; color: var(--on-accent);
    background: #fff; color: #201018;
    display: inline-flex; align-items: center; justify-content: center; gap: 9px;
    box-shadow: 0 14px 30px -12px rgba(0,0,0,.6); transition: transform .25s var(--ease-spring);
  }
  .dive:active { transform: scale(.97); }
  .dive svg { display: block; }

  /* up/down affordance */
  .swipehint {
    position: absolute; z-index: 20; left: 50%; top: 33%; transform: translateX(-50%);
    display: flex; flex-direction: column; align-items: center; gap: 4px;
    font-size: .66rem; font-weight: 800; letter-spacing: .08em; text-transform: uppercase; color: rgba(255,255,255,.82);
    pointer-events: none; animation: floaty 1.8s var(--ease-soft) infinite; transition: opacity .3s;
    text-shadow: 0 1px 8px rgba(0,0,0,.35);
  }
  .swipehint svg { display: block; opacity: .85; }
  @keyframes floaty { 0%,100% { transform: translate(-50%, 0); } 50% { transform: translate(-50%, -5px); } }

  /* right-edge scroll dots */
  .dots { position: absolute; z-index: 20; right: 10px; top: 50%; transform: translateY(-50%); display: flex; flex-direction: column; gap: 6px; pointer-events: none; }
  .dots i { width: 5px; height: 5px; border-radius: 50%; background: rgba(255,255,255,.35); transition: all .25s; }
  .dots i.on { background: #fff; height: 16px; border-radius: 3px; }

  .home-ind { position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%); width: 134px; height: 5px; border-radius: 3px; background: #fff; opacity: .5; z-index: 25; }

  /* ---------- "jump to a theme" overview (tap the n/30 pill) ---------- */
  .progresspill { cursor: pointer; }
  .progresspill .caret { margin-left: 4px; opacity: .8; }
  .ov-backdrop {
    position: absolute; inset: 0; z-index: 40; background: rgba(6,4,10,.6);
    backdrop-filter: blur(2px); opacity: 0; pointer-events: none; transition: opacity .3s var(--ease-soft);
  }
  .ov-backdrop.show { opacity: 1; pointer-events: auto; }
  .ov-sheet {
    position: absolute; left: 0; right: 0; bottom: 0; z-index: 41; height: 76%;
    background: var(--surface); border-radius: 26px 26px 0 0; overflow: hidden; display: flex; flex-direction: column;
    box-shadow: 0 -18px 50px -24px rgba(0,0,0,.7), inset 0 0 0 .5px var(--hairline);
    transform: translateY(102%); transition: transform .38s var(--ease-spring);
  }
  .ov-sheet.show { transform: translateY(0); }
  .ov-grab { flex: none; padding: 10px 0 2px; display: grid; place-items: center; }
  .ov-grab i { width: 40px; height: 5px; border-radius: 3px; background: var(--separator); }
  .ov-head { flex: none; display: flex; align-items: center; justify-content: space-between; padding: 6px var(--gutter) 10px; }
  .ov-head h2 { font-family: var(--font-display); font-weight: 700; font-size: 1.16rem; letter-spacing: -.01em; color: var(--text); }
  .ov-head .ov-x { width: 34px; height: 34px; border-radius: 50%; border: none; cursor: pointer; background: var(--chip); color: var(--text); display: grid; place-items: center; }
  .ov-list { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 0 var(--gutter) 20px; scrollbar-width: none; }
  .ov-list::-webkit-scrollbar { width: 0; }
  .ov-row {
    display: flex; align-items: center; gap: var(--sp-3); padding: 9px 6px; cursor: pointer;
    border-radius: 12px; position: relative; transition: background .15s;
  }
  .ov-row:not(:last-child)::after { content: ""; position: absolute; left: 56px; right: 6px; bottom: 0; height: .5px; background: var(--separator); }
  .ov-row:active { background: color-mix(in srgb, var(--text) 7%, transparent); }
  .ov-row.here { background: color-mix(in srgb, var(--accent) 12%, transparent); }
  .ov-ico { flex: none; width: 40px; height: 40px; border-radius: 11px; display: grid; place-items: center; font-size: 1.15rem;
    box-shadow: inset 0 0 0 .5px rgba(255,255,255,.18); }
  .ov-meta { flex: 1; min-width: 0; }
  .ov-name { font-size: .98rem; font-weight: 700; letter-spacing: -.01em; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .ov-count { margin-top: 1px; font-size: .78rem; font-weight: 600; color: var(--text-dim); }
  .ov-row .chev { flex: none; color: var(--text-faint); }

  @media (prefers-reduced-motion: reduce) { .swipehint { animation: none; } .feed { scroll-behavior: auto; } .ov-sheet { transition: none; } }
</style>

<button class="theme-toggle" id="tt" aria-label="Toggle light and dark theme">
  <span class="tg-emoji" id="tgEmoji">🌙</span><span id="tgLabel">Dark</span>
</button>

<div class="phone">
  <div class="notch"></div>
  <div class="screen">

    <!-- vertical theme feed -->
    <div class="feed" id="feed"><!-- slides injected --></div>

    <!-- overlay chrome -->
    <div class="statusbar">
      <span>9:41</span>
      <span class="sb-right">
        <svg width="18" height="12" viewBox="0 0 18 12" fill="currentColor"><rect x="0" y="7" width="3" height="5" rx="1"/><rect x="4.5" y="4.5" width="3" height="7.5" rx="1"/><rect x="9" y="2" width="3" height="10" rx="1"/><rect x="13.5" y="0" width="3" height="12" rx="1"/></svg>
        <svg width="17" height="12" viewBox="0 0 17 12" fill="currentColor"><path d="M8.5 2.4c2 0 3.9.8 5.3 2.1l1.2-1.3A9.4 9.4 0 0 0 8.5.6 9.4 9.4 0 0 0 2 3.2l1.2 1.3A7.4 7.4 0 0 1 8.5 2.4Z"/><path d="M8.5 6c1 0 2 .4 2.7 1.1l1.2-1.3A6 6 0 0 0 8.5 4a6 6 0 0 0-3.9 1.8l1.2 1.3A4 4 0 0 1 8.5 6Z"/><circle cx="8.5" cy="9.6" r="1.7"/></svg>
        <svg width="26" height="12" viewBox="0 0 26 12" fill="none"><rect x="1" y="1" width="21" height="10" rx="3" stroke="currentColor" stroke-width="1.2" opacity=".5"/><rect x="2.6" y="2.6" width="16" height="6.8" rx="1.6" fill="currentColor"/><rect x="23.4" y="4" width="1.8" height="4" rx="1" fill="currentColor" opacity=".6"/></svg>
      </span>
    </div>

    <div class="topbar">
      <button class="iconbtn" aria-label="Back to Home" onclick="history.length>1?history.back():null">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M15 5l-7 7 7 7" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
      <div class="tb-title"><div class="tb-eyebrow">Explore by theme</div></div>
      <button class="progresspill" id="pill" aria-label="Jump to a theme" onclick="openList()"><b id="pgNow">1</b>/<span id="pgTotal">30</span><svg class="caret" width="11" height="11" viewBox="0 0 24 24" fill="none"><path d="M6 9l6 6 6-6" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
    </div>

    <div class="dots" id="dots" aria-hidden="true"></div>

    <!-- jump-to-a-theme overview -->
    <div class="ov-backdrop" id="ovBackdrop" onclick="closeList()"></div>
    <div class="ov-sheet" id="ovSheet" role="dialog" aria-label="All themes">
      <div class="ov-grab"><i></i></div>
      <div class="ov-head">
        <h2>Jump to a theme</h2>
        <button class="ov-x" aria-label="Close" onclick="closeList()">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M6 6l12 12M18 6L6 18" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/></svg>
        </button>
      </div>
      <div class="ov-list" id="ovList"></div>
    </div>

    <div class="swipehint" id="swipehint">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M12 19V5M6 11l6-6 6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      Swipe up
    </div>

    <div class="home-ind"></div>
  </div>
</div>

<script>
  // ---- theme data (real slugs/names/counts/descriptions from curation/catalog/themes.json) ----
  // thumbs: up to 5 shows to peek — `art` = local jpg, else initial on a gradient tile.
  const THEMES = [
    { slug:'institutional-coverup', name:'The Institutional Cover-Up', count:72, emoji:'🕵️', g:'g0',
      desc:'A powerful institution hid its wrongdoing — and protected itself instead of the people it harmed.',
      thumbs:[{art:'serial.jpg'},{art:'bone-valley.jpg'},{i:'R'},{i:'F'},{i:'D'}] },
    { slug:'historical-reconstruction', name:'History, Retold', count:56, emoji:'📜', g:'g1',
      desc:'A narrative rebuilds a past event or figure from the record — revising what we thought we knew.',
      thumbs:[{art:'rest-is-history.jpg'},{art:'fall-of-civilizations.jpg'},{art:'american-history-tellers.jpg'},{art:'revolutions.jpg'},{i:'C'}] },
    { slug:'unsolved-cold-case', name:'Unsolved & Cold Cases', count:54, emoji:'🔎', g:'g2',
      desc:'A killing that was never solved gets reopened years later, chasing overlooked evidence.',
      thumbs:[{art:'serial.jpg'},{i:'L'},{i:'G'},{i:'S'},{i:'O'}] },
    { slug:'abuse-of-power', name:'Abuse of Power', count:40, emoji:'⚖️', g:'g7',
      desc:'Someone with authority exploits that trust, and the reporting follows the trail of victims.',
      thumbs:[{i:'D'},{i:'D'},{i:'S'},{art:'radiolab.jpg'},{i:'7'}] },
    { slug:'personal-mystery', name:'Personal Mysteries', count:40, emoji:'🧩', g:'g6',
      desc:'A host chases a private, human-scale puzzle — as much about the searcher as the answer.',
      thumbs:[{art:'song-exploder.jpg'},{i:'S'},{i:'A'},{i:'T'},{i:'L'}] },
    { slug:'financial-fraud', name:'Fraud, Scams & Ponzis', count:36, emoji:'💸', g:'g4',
      desc:'Money is the crime scene — fake companies and cooked books that unravel when the cash runs out.',
      thumbs:[{art:'acquired.jpg'},{i:'W'},{i:'S'},{i:'A'},{i:'C'}] },
    { slug:'charismatic-con-artist', name:'The Charismatic Con Artist', count:30, emoji:'🎭', g:'g3',
      desc:'A magnetic liar wins trust, builds a fantasy, and leaves ruin behind.',
      thumbs:[{i:'D'},{i:'W'},{i:'S'},{i:'S'},{i:'D'}] },
    { slug:'cult-high-control-group', name:'Cults & High-Control Groups', count:11, emoji:'🕯️', g:'g5',
      desc:'Inside groups that isolate and control their members — the leaders, and the survivors who escape.',
      thumbs:[{art:'behind-the-bastards.jpg'},{i:'T'},{i:'I'},{i:'C'},{i:'Q'}] },
  ];
  const TOTAL = 30; // full catalog has 30 themes; the feed demos the first 8

  const feed = document.getElementById('feed');
  const pgNow = document.getElementById('pgNow');
  const dots = document.getElementById('dots');
  const swipehint = document.getElementById('swipehint');
  document.getElementById('pgTotal').textContent = TOTAL;

  const arrowSVG = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M5 12h13M13 6l6 6-6 6" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/></svg>`;

  THEMES.forEach((t, idx) => {
    const thumbs = t.thumbs.map((th, i) => th.art
      ? `<div class="thumb" style="background-image:url(../art/${th.art})"></div>`
      : `<div class="thumb t${(i%5)+1}">${th.i}</div>`).join('');
    const more = t.count - t.thumbs.length;
    const slide = document.createElement('section');
    slide.className = `slide ${t.g}`;
    slide.dataset.index = idx;
    slide.innerHTML = `
      <div class="wm">${t.emoji}</div>
      <div class="inner">
        <span class="kicker"><span class="em">${t.emoji}</span>Theme ${idx + 1} of ${TOTAL}</span>
        <div class="name">${t.name}</div>
        <div class="desc">${t.desc}</div>
        <div class="inside">
          <div class="inside-label">Inside this theme</div>
          <div class="thumbs">
            ${thumbs}
            <div class="thumb more">+${more}</div>
          </div>
        </div>
        <button class="dive" onclick="location.href='explore-theme-shows.html?theme=${t.slug}'">
          Dive in — swipe the shows ${arrowSVG}
        </button>
      </div>`;
    feed.appendChild(slide);
    const d = document.createElement('i'); if (idx === 0) d.className = 'on'; dots.appendChild(d);
  });

  // update progress + dots on scroll (which theme is centered)
  let current = 0;
  const io = new IntersectionObserver((entries) => {
    entries.forEach(e => {
      if (e.isIntersecting && e.intersectionRatio > 0.6) {
        const i = +e.target.dataset.index; current = i;
        pgNow.textContent = i + 1;
        [...dots.children].forEach((d, di) => d.classList.toggle('on', di === i));
        if (i > 0) swipehint.style.opacity = '0';
      }
    });
  }, { root: feed, threshold: [0.6] });
  [...feed.children].forEach(s => io.observe(s));

  // ---- "jump to a theme" overview: the full 30-theme index (names/counts from themes.json) ----
  const THEME_INDEX = [
    ['institutional-coverup','The Institutional Cover-Up',72,'🕵️'], ['historical-reconstruction','History, Retold',56,'📜'],
    ['unsolved-cold-case','Unsolved Murders & Cold Cases',54,'🔎'], ['abuse-of-power','Abuse of Power',40,'⚖️'],
    ['personal-mystery','Personal Mysteries & Obsessions',40,'🧩'], ['financial-fraud','Fraud, Scams & Ponzis',36,'💸'],
    ['survivor-testimony','Survivor Testimony',35,'🗣️'], ['true-crime','True Crime, Deep-Dive',35,'🔦'],
    ['charismatic-con-artist','The Charismatic Con Artist',30,'🎭'], ['media-internet-culture','Media & Internet Culture',29,'📱'],
    ['speculative-fiction-as-journalism',"Fiction Wearing Journalism's Clothes",29,'🎙️'], ['racial-injustice-civil-rights','Racial Injustice & Civil Rights',27,'✊'],
    ['disappearance-missing-persons','Disappearances & Missing Persons',26,'🚶'], ['political-scandal','Political Scandal',25,'🏛️'],
    ['business-empire','Building (and Breaking) an Empire',24,'🏦'], ['music-history','Music History',19,'🎵'],
    ['police-misconduct','Police Misconduct',18,'🚔'], ['wrongful-conviction','Wrongful Conviction',17,'⛓️'],
    ['family-secret','Family Secrets',17,'🧬'], ['tech-gone-wrong','Tech Gone Wrong',17,'💻'],
    ['espionage-intelligence','Spies & Secret Intelligence',17,'🕶️'], ['serial-killer','Serial Killers',16,'🩸'],
    ['war-conflict','War & Conflict',14,'💥'], ['science-wonder','Science & Wonder',12,'🔬'],
    ['cult-high-control-group','Cults & High-Control Groups',11,'🕯️'], ['religion-faith','Religion & Faith',10,'✝️'],
    ['sports-narrative','Sports, Beyond the Game',10,'🏟️'], ['medical-harm','Medical Harm',9,'🩺'],
    ['environmental-climate','Environment & Climate',5,'🌍'], ['immigration','Immigration & Borders',2,'🛂'],
  ];
  const feedIndexBySlug = {}; THEMES.forEach((t, i) => feedIndexBySlug[t.slug] = i);
  const igrad = ['g0','g1','g2','g3','g4','g5','g6','g7'];
  const ovBackdrop = document.getElementById('ovBackdrop'), ovSheet = document.getElementById('ovSheet'), ovList = document.getElementById('ovList');

  THEME_INDEX.forEach(([slug, name, count, emoji], i) => {
    const fi = feedIndexBySlug[slug];
    const row = document.createElement('div');
    row.className = 'ov-row'; row.dataset.slug = slug; if (fi !== undefined) row.dataset.fi = fi;
    row.innerHTML = `
      <div class="ov-ico ${igrad[i % 8]}" style="background:linear-gradient(140deg, hsl(${(i*37)%360} 70% 58%), hsl(${(i*37+40)%360} 65% 40%))">${emoji}</div>
      <div class="ov-meta"><div class="ov-name">${name}</div><div class="ov-count">${count} shows</div></div>
      <svg class="chev" width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M9 6l6 6-6 6" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
    row.addEventListener('click', () => jumpTo(fi, slug));
    ovList.appendChild(row);
  });

  function openList() {
    [...ovList.children].forEach(r => r.classList.toggle('here', +r.dataset.fi === current));
    ovBackdrop.classList.add('show'); ovSheet.classList.add('show');
    // scroll ONLY the list (not the page) so the current theme's row is centered
    const here = ovList.querySelector('.ov-row.here');
    if (here) {
      const delta = here.getBoundingClientRect().top - ovList.getBoundingClientRect().top;
      ovList.scrollTop = Math.max(0, ovList.scrollTop + delta - ovList.clientHeight / 2 + here.offsetHeight / 2);
    } else { ovList.scrollTop = 0; }
  }
  function closeList() { ovBackdrop.classList.remove('show'); ovSheet.classList.remove('show'); }
  function jumpTo(fi, slug) {
    if (fi === undefined) { closeList(); return; } // theme not in the demo feed (full app has all 30 loaded)
    feed.children[fi].scrollIntoView({ behavior: 'instant' });
    closeList();
  }

  // theme toggle
  const root = document.documentElement, tt = document.getElementById('tt'),
        tgEmoji = document.getElementById('tgEmoji'), tgLabel = document.getElementById('tgLabel');
  root.setAttribute('data-theme', 'dark');
  tt.addEventListener('click', () => {
    const dark = root.getAttribute('data-theme') === 'dark';
    root.setAttribute('data-theme', dark ? 'light' : 'dark');
    tgEmoji.textContent = dark ? '☀️' : '🌙'; tgLabel.textContent = dark ? 'Light' : 'Dark';
  });
</script>
