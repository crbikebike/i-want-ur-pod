<title>Explore by theme — Home hero card</title>
<link rel="stylesheet" href="../fonts/fonts.css">
<style>
  :root {
    --coral: #FF6A4D; --coral-deep: #CA340F; --mint: #34E0C4; --mint-deep: #046B58; --grape: #7C6BFF;
    --sp-1: 4px; --sp-2: 8px; --sp-3: 12px; --sp-4: 16px; --sp-5: 20px; --sp-6: 26px; --sp-7: 32px; --gutter: var(--sp-5);
    --r-lg: 20px; --r-md: 16px; --r-sm: 12px; --r-art: 14px; --r-pill: 999px;
    --dur-mid: .3s; --ease-spring: cubic-bezier(.34, 1.56, .64, 1); --ease-soft: cubic-bezier(.22, .61, .36, 1);
    --elev-card: 0 1px 0 var(--hairline), 0 12px 30px -20px rgba(0,0,0,.55);
    --font: "Roboto", -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    --font-display: "IBM Plex Mono", ui-monospace, "SF Mono", Menlo, monospace;
  }
  :root, :root[data-theme="dark"] {
    --grouped-bg: #0E0B12; --bg-glow-1: rgba(255,106,77,.10); --bg-glow-2: rgba(52,224,196,.07);
    --surface: #1C1722; --hairline: rgba(255,255,255,.09); --separator: rgba(255,255,255,.12);
    --text: #F8F3EF; --text-dim: #ABA1B4; --text-faint: #988DA1;
    --accent: var(--coral); --accent-2: var(--mint); --on-accent: #2A0E04; --chip: rgba(255,255,255,.08);
  }
  :root[data-theme="light"] {
    --grouped-bg: #F2F1F6; --bg-glow-1: rgba(245,80,47,.09); --bg-glow-2: rgba(6,169,139,.08);
    --surface: #FFFFFF; --hairline: rgba(40,26,36,.10); --separator: rgba(60,60,67,.18);
    --text: #1A1420; --text-dim: #6B6472; --text-faint: #736A78;
    --accent: var(--coral-deep); --accent-2: var(--mint-deep); --on-accent: #FFFFFF; --chip: rgba(118,118,128,.12);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: var(--font);
    background: radial-gradient(120% 60% at 85% -5%, #211a2b, transparent 60%), radial-gradient(90% 50% at 0% 8%, #17131e, transparent 55%), #0a070e;
    color: var(--text); min-height: 100vh; display: grid; place-items: center; padding: 28px 12px; transition: background .5s var(--ease-soft);
  }
  :root[data-theme="light"] body {
    background: radial-gradient(120% 60% at 85% -5%, #f0e6f4, transparent 60%), radial-gradient(90% 50% at 0% 8%, #eef0f6, transparent 55%), #e6e4ee;
  }
  .theme-toggle {
    position: fixed; top: 16px; right: 16px; z-index: 100; height: 44px; padding: 0 16px 0 14px;
    display: inline-flex; align-items: center; gap: 8px; border: 1px solid rgba(255,255,255,.16);
    border-radius: var(--r-pill); background: rgba(30,24,38,.7); backdrop-filter: blur(14px);
    color: #F8F3EF; font-family: var(--font); font-size: .82rem; font-weight: 700; cursor: pointer; transition: transform .3s var(--ease-spring), background .3s;
  }
  :root[data-theme="light"] .theme-toggle { background: rgba(255,255,255,.82); border-color: rgba(40,26,36,.12); color: #1A1420; }
  .theme-toggle:active { transform: scale(.92); }

  /* context stage — a slice of the Home scroll so placement reads */
  .stage {
    width: 390px; background: var(--grouped-bg); border-radius: 30px;
    padding: var(--sp-5) var(--gutter) var(--sp-6); box-shadow: 0 40px 90px -40px rgba(0,0,0,.8);
    position: relative; overflow: hidden; transition: background .5s var(--ease-soft);
  }
  .stage::before {
    content: ""; position: absolute; inset: 0; pointer-events: none;
    background: radial-gradient(58% 20% at 92% 0%, var(--bg-glow-1), transparent 70%), radial-gradient(46% 16% at 2% 6%, var(--bg-glow-2), transparent 72%);
  }
  .ctx { position: relative; z-index: 2; }
  .sec-head { margin: var(--sp-5) 2px var(--sp-1); display: flex; align-items: center; justify-content: space-between; }
  .sec-head h2 { font-family: var(--font-display); font-weight: 700; font-size: 1.34rem; letter-spacing: -.015em; }
  .see-all { font-size: .82rem; font-weight: 800; color: var(--accent); text-decoration: none; }
  .ghost-rail { display: flex; gap: var(--sp-3); margin-top: var(--sp-3); opacity: .28; }
  .ghost-pod { flex: none; width: 92px; }
  .ghost-art { width: 92px; height: 92px; border-radius: var(--r-md); background: var(--chip); }
  .ghost-l1 { height: 9px; width: 80%; border-radius: 5px; background: var(--chip); margin-top: 9px; }
  .ghost-l2 { height: 8px; width: 55%; border-radius: 5px; background: var(--chip); margin-top: 6px; }
  .slice-label { text-align: center; font-size: .68rem; font-weight: 800; letter-spacing: .12em; text-transform: uppercase; color: var(--text-faint); margin-bottom: var(--sp-2); }

  /* ================= THE HERO CARD (the component) ================= */
  .hero {
    position: relative; display: block; width: 100%; margin-top: var(--sp-5); text-align: left;
    border: none; cursor: pointer; border-radius: var(--r-lg); overflow: hidden; padding: 20px 20px 20px;
    background: linear-gradient(135deg, #FF6A4D 0%, #CA340F 46%, #7C6BFF 116%);
    box-shadow: var(--elev-card), 0 18px 40px -22px rgba(255,106,77,.7);
    color: #fff; min-height: 138px; isolation: isolate; text-decoration: none;
    transition: transform var(--dur-mid) var(--ease-spring), box-shadow var(--dur-mid);
  }
  .hero:active { transform: scale(.975); }
  .hero::after {
    content: ""; position: absolute; inset: 0; z-index: 0; pointer-events: none;
    background: radial-gradient(80% 60% at 12% 6%, rgba(255,255,255,.26), transparent 55%),
                radial-gradient(60% 80% at 100% 110%, rgba(0,0,0,.28), transparent 60%);
  }
  .hero-copy { position: relative; z-index: 2; max-width: 62%; }
  .hero-eyebrow {
    display: inline-flex; align-items: center; gap: 7px; font-size: .64rem; font-weight: 800;
    letter-spacing: .14em; text-transform: uppercase; color: rgba(255,255,255,.92);
  }
  .hero-eyebrow .spark { width: 6px; height: 6px; border-radius: 50%; background: var(--mint); box-shadow: 0 0 10px var(--mint); }
  .hero-title { font-family: var(--font-display); font-weight: 700; font-size: 1.66rem; line-height: 1.04; letter-spacing: -.02em; margin-top: 9px; text-shadow: 0 2px 18px rgba(0,0,0,.28); }
  .hero-sub { margin-top: 8px; font-size: .88rem; font-weight: 500; line-height: 1.34; color: rgba(255,255,255,.9); }
  .hero-meta { display: flex; gap: 7px; margin-top: 14px; }
  .hero-pill {
    font-size: .68rem; font-weight: 800; letter-spacing: .02em; color: #fff;
    background: rgba(255,255,255,.18); border: 1px solid rgba(255,255,255,.28);
    padding: 5px 11px; border-radius: var(--r-pill); backdrop-filter: blur(6px);
  }

  /* playful mini deck-stack motif on the right */
  .hero-deck { position: absolute; z-index: 1; right: -8px; bottom: -6px; width: 132px; height: 138px; pointer-events: none; }
  .mini {
    position: absolute; width: 76px; height: 100px; border-radius: 15px;
    box-shadow: 0 10px 22px -10px rgba(0,0,0,.55), inset 0 0 0 1px rgba(255,255,255,.22);
    display: grid; place-items: center; font-size: 2rem;
  }
  .mini.m1 { right: 44px; bottom: 20px; transform: rotate(-15deg); background: linear-gradient(150deg,#2E8BFF,#12324F); z-index: 1; }
  .mini.m2 { right: 26px; bottom: 12px; transform: rotate(-4deg);  background: linear-gradient(150deg,#FF5E9A,#7C1D4B); z-index: 2; }
  .mini.m3 { right: 6px;  bottom: 4px;  transform: rotate(9deg);   background: linear-gradient(150deg,#22C1A6,#046B58); z-index: 3; }
  .hero .arrow {
    position: absolute; z-index: 3; right: 16px; top: 18px; width: 34px; height: 34px; border-radius: 50%;
    display: grid; place-items: center; background: rgba(255,255,255,.2); border: 1px solid rgba(255,255,255,.32); backdrop-filter: blur(6px);
  }
  .hero .arrow svg { display: block; }
</style>

<button class="theme-toggle" onclick="const r=document.documentElement;const d=r.getAttribute('data-theme')==='dark';r.setAttribute('data-theme',d?'light':'dark');this.querySelector('span').textContent=d?'☀️':'🌙';">
  <span>🌙</span> Theme
</button>

<div class="stage">
  <div class="ctx">
    <div class="slice-label">— Home scroll · placement in context —</div>

    <!-- neighbor above -->
    <div class="sec-head"><h2>New episodes</h2><a class="see-all" href="#">See all</a></div>
    <div class="ghost-rail" aria-hidden="true">
      <div class="ghost-pod"><div class="ghost-art"></div><div class="ghost-l1"></div><div class="ghost-l2"></div></div>
      <div class="ghost-pod"><div class="ghost-art"></div><div class="ghost-l1"></div><div class="ghost-l2"></div></div>
      <div class="ghost-pod"><div class="ghost-art"></div><div class="ghost-l1"></div><div class="ghost-l2"></div></div>
    </div>

    <!-- THE HERO CARD -->
    <a class="hero" href="../screens/explore-themes.html" aria-label="Explore by theme — swipe through 30 themes">
      <div class="arrow"><svg width="17" height="17" viewBox="0 0 24 24" fill="none"><path d="M5 12h13M13 6l6 6-6 6" stroke="#fff" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
      <div class="hero-copy">
        <span class="hero-eyebrow"><span class="spark"></span>Guided · Swipe to discover</span>
        <div class="hero-title">Explore by theme</div>
        <div class="hero-sub">Flip through 30 story-worlds and find your next obsession.</div>
        <div class="hero-meta">
          <span class="hero-pill">315 shows</span>
          <span class="hero-pill">30 themes</span>
        </div>
      </div>
      <div class="hero-deck" aria-hidden="true">
        <div class="mini m1">🔎</div>
        <div class="mini m2">🎭</div>
        <div class="mini m3">🕵️</div>
      </div>
    </a>

    <!-- neighbor below -->
    <div class="sec-head"><h2>Our favorites</h2><a class="see-all" href="#">staff</a></div>
    <div class="ghost-rail" aria-hidden="true">
      <div class="ghost-pod"><div class="ghost-art"></div><div class="ghost-l1"></div><div class="ghost-l2"></div></div>
      <div class="ghost-pod"><div class="ghost-art"></div><div class="ghost-l1"></div><div class="ghost-l2"></div></div>
      <div class="ghost-pod"><div class="ghost-art"></div><div class="ghost-l1"></div><div class="ghost-l2"></div></div>
    </div>
  </div>
</div>
